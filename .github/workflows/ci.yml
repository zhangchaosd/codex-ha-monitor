name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  agent:
    name: Agent / Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: |
            agent/go.mod
            agent/go.sum
      - name: Test
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./cmd/cma

  home-assistant:
    name: Home Assistant integration / Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install test tools
        run: python -m pip install pytest-homeassistant-custom-component ruff
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Test
        run: pytest -q
      - name: Validate JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          for path in Path(".").rglob("*.json"):
              json.loads(path.read_text(encoding="utf-8"))
              print(path)
          PY
